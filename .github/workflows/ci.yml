name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: Swift 6.3 on macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - run: swift test

  linux:
    name: Swift 6.3 on Linux
    runs-on: ubuntu-latest
    container: swift:6.3
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - run: swift test
